<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APS Morelli e Silvati</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f0f4f8;color:#333}
header{background:#1a73e8;color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:1.1rem}
nav{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:10px 0 14px;box-shadow:0 -2px 10px rgba(0,0,0,.1);z-index:100}
nav button{background:none;border:none;font-size:.65rem;color:#888;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
nav button span{font-size:1.4rem}
nav button.attivo{color:#1a73e8;font-weight:700}
main{padding:20px 16px 90px;max-width:600px;margin:0 auto}
.sez{display:none}
.sez.on{display:block}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.card h3{color:#1a73e8;margin-bottom:6px}
.card p{font-size:.88rem;color:#555;line-height:1.5}
.card .meta{font-size:.75rem;color:#999;margin-top:6px}
#tcard{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:white;border-radius:16px;padding:24px 20px;margin-bottom:20px}
#tcard h2{font-size:1.1rem;margin-bottom:4px}
.badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:2px 10px;font-size:.75rem;margin-bottom:16px}
.codice{font-family:monospace;font-size:1.2rem;letter-spacing:3px;background:rgba(255,255,255,.15);padding:8px 12px;border-radius:8px;display:inline-block}
#lbox{background:white;border-radius:16px;padding:30px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:380px;margin:40px auto 0}
#lbox h2{color:#1a73e8;margin-bottom:20px}
#lbox input{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:8px;font-size:.95rem;margin-bottom:14px;outline:none}
#lbox button{width:100%;background:#1a73e8;color:white;border:none;border-radius:8px;padding:13px;font-size:1rem;cursor:pointer;font-weight:600}
#lerr{color:#e53935;font-size:.85rem;margin-top:10px;min-height:18px}
.fa input,.fa textarea,.fa select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:.9rem;margin-bottom:10px;font-family:inherit;outline:none}
.fa textarea{min-height:70px;resize:vertical}
.bp{background:#1a73e8;color:white;border:none;border-radius:8px;padding:12px;font-size:.9rem;cursor:pointer;font-weight:600;width:100%}
.ts{font-size:1rem;font-weight:700;color:#1a4fa0;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e3eaf5}
.load{text-align:center;color:#888;padding:24px;font-size:.9rem}
.empty{text-align:center;color:#bbb;padding:24px;font-size:.9rem}
.msg{font-size:.85rem;margin-top:8px}
.album-card{background:white;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,.07);cursor:pointer}
.album-card h3{color:#1a73e8;margin-bottom:4px}
.album-card .album-info{font-size:.8rem;color:#999}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.foto-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer}
.back-btn{background:none;border:none;color:#1a73e8;font-size:.9rem;cursor:pointer;margin-bottom:14px;padding:0;display:flex;align-items:center;gap:4px}
.lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:999;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;color:white;font-size:2rem;cursor:pointer;background:none;border:none}
</style>
</head>
<body>
<header><h1>APS Morelli e Silvati</h1><span id="uinfo"></span></header>
<main>
<div id="login">
<div id="lbox">
<h2>Accedi</h2>
<input type="email" id="email" placeholder="La tua email">
<button id="btnLogin">Entra</button>
<div id="lerr"></div>
</div>
</div>
<div id="app" style="display:none">
<div id="s-home" class="sez on">
<div id="tcard">
<div style="opacity:.7;font-size:.75rem;margin-bottom:4px">TESSERA DIGITALE</div>
<h2 id="tnome">Nome Cognome</h2>
<div class="badge" id="truolo">Tesserato</div>
<div style="margin-top:10px;opacity:.8;font-size:.75rem">Codice</div>
<div class="codice" id="tcodice">TESS-XXXXXX</div>
</div>
<div class="ts">Ultime News</div>
<div id="news-list"><div class="load">Caricamento...</div></div>
</div>
<div id="s-eventi" class="sez">
<div class="ts">Prossimi Eventi</div>
<div id="ev-list"><div class="load">Caricamento...</div></div>
</div>
<div id="s-gallery" class="sez">
<div id="album-view">
<div class="ts">Galleria Foto</div>
<div id="album-list"><div class="load">Caricamento...</div></div>
</div>
<div id="foto-view" style="display:none">
<button class="back-btn" id="btnBack">&#8592; Torna agli album</button>
<div class="ts" id="album-titolo"></div>
<div class="foto-grid" id="foto-list"></div>
</div>
</div>
<div id="s-admin" class="sez">
<div class="ts">Pannello Soci</div>
<div class="card">
<h3>Aggiungi Tesserato</h3>
<div class="fa" style="margin-top:10px">
<input id="an" placeholder="Nome">
<input id="ac" placeholder="Cognome">
<select id="ar"><option value="Tesserato">Tesserato</option><option value="Socio">Socio</option></select>
<input id="ae" type="email" placeholder="Email">
<input id="at" type="tel" placeholder="Telefono">
<button class="bp" id="btnAddU">Salva Tesserato</button>
<div id="mu" class="msg"></div>
</div>
</div>
<div class="card" style="margin-top:4px">
<h3>Nuovo Evento</h3>
<div class="fa" style="margin-top:10px">
<input id="et" placeholder="Titolo">
<input id="ed" type="date">
<input id="el" placeholder="Luogo">
<textarea id="edes" placeholder="Descrizione..."></textarea>
<button class="bp" id="btnAddE">Pubblica Evento</button>
<div id="me" class="msg"></div>
</div>
</div>
<div class="card" style="margin-top:4px">
<h3>Nuova News</h3>
<div class="fa" style="margin-top:10px">
<input id="nt" placeholder="Titolo news">
<textarea id="nc" placeholder="Testo..."></textarea>
<button class="bp" id="btnAddN">Pubblica News</button>
<div id="mn" class="msg"></div>
</div>
</div>
</div>
</div>
</main>
<div class="lightbox" id="lightbox">
<button class="lightbox-close" id="lbClose">&#10005;</button>
<img id="lbImg" src="" alt="">
</div>
<nav id="nav" style="display:none">
<button class="attivo" id="nb-home"><span>&#127968;</span>Home</button>
<button id="nb-eventi"><span>&#128197;</span>Eventi</button>
<button id="nb-gallery"><span>&#128247;</span>Gallery</button>
<button id="nb-admin" style="display:none"><span>&#9881;&#65039;</span>Gestione</button>
</nav>
<script>
var API='https://script.google.com/macros/s/AKfycbytyqnN7KrLxKMwWDJOjTT9i2uPUguzBYa9fTnqaYI05ZzJTxV4ERMPJhyxArlQI9effQ/exec';
var utente=null;
var timer=null;

document.getElementById('btnLogin').addEventListener('click',function(){
var email=document.getElementById('email').value.trim();
var err=document.getElementById('lerr');
if(!email){err.textContent='Inserisci la tua email.';return;}
err.textContent='Accesso in corso...';
fetch(API+'?action=login&email='+encodeURIComponent(email))
.then(function(r){return r.json();})
.then(function(d){if(d.successo){utente=d;avvia();}else{err.textContent='Email non trovata.';}})
.catch(function(){err.textContent='Errore connessione.';});
});

function avvia(){
document.getElementById('login').style.display='none';
document.getElementById('app').style.display='block';
document.getElementById('nav').style.display='flex';
document.getElementById('tnome').textContent=utente.nome+' '+utente.cognome;
document.getElementById('truolo').textContent=utente.ruolo;
document.getElementById('tcodice').textContent=utente.codice_tessera;
document.getElementById('uinfo').textContent=utente.nome;
if(utente.ruolo==='Socio')document.getElementById('nb-admin').style.display='flex';
loadNews();loadEventi();
timer=setInterval(function(){loadNews();loadEventi();},30000);
}

function vai(nome){
document.querySelectorAll('.sez').forEach(function(s){s.classList.remove('on');});
document.querySelectorAll('nav button').forEach(function(b){b.classList.remove('attivo');});
document.getElementById('s-'+nome).classList.add('on');
document.getElementById('nb-'+nome).classList.add('attivo');
if(nome==='home'){loadNews();loadEventi();}
if(nome==='gallery'){loadGallery();}
}

document.getElementById('nb-home').addEventListener('click',function(){vai('home');});
document.getElementById('nb-eventi').addEventListener('click',function(){vai('eventi');});
document.getElementById('nb-gallery').addEventListener('click',function(){vai('gallery');});
document.getElementById('nb-admin').addEventListener('click',function(){vai('admin');});

function loadNews(){
fetch(API+'?action=getNews')
.then(function(r){return r.json();})
.then(function(list){
var div=document.getElementById('news-list');
if(!list.length){div.innerHTML='<div class="empty">Nessuna news.</div>';return;}
div.innerHTML=list.slice(-3).reverse().map(function(n){
return '<div class="card"><h3>'+n.Titolo+'</h3><p>'+n.Contenuto+'</p><div class="meta">'+n.Data+'</div></div>';
}).join('');
}).catch(function(){document.getElementById('news-list').innerHTML='<div class="empty">Errore.</div>';});
}

function loadEventi(){
fetch(API+'?action=getEventi')
.then(function(r){return r.json();})
.then(function(list){
var div=document.getElementById('ev-list');
if(!list.length){div.innerHTML='<div class="empty">Nessun evento.</div>';return;}
div.innerHTML=list.map(function(e){
return '<div class="card"><h3>'+e.Titolo+'</h3><p>'+e.Descrizione+'</p><div class="meta">'+e.Data+' - '+e.Luogo+'</div></div>';
}).join('');
}).catch(function(){document.getElementById('ev-list').innerHTML='<div class="empty">Errore.</div>';});
}

function loadGallery(){
document.getElementById('album-view').style.display='block';
document.getElementById('foto-view').style.display='none';
document.getElementById('album-list').innerHTML='<div class="load">Caricamento album...</div>';
fetch(API+'?action=getGalleria')
.then(function(r){return r.json();})
.then(function(albums){
var div=document.getElementById('album-list');
if(!albums.length){div.innerHTML='<div class="empty">Nessun album trovato.</div>';return;}
div.innerHTML=albums.map(function(a,i){
return '<div class="album-card" onclick="apriAlbum('+i+')"><h3>'+a.nome+'</h3><div class="album-info
'">'+a.foto.length+' foto</div></div>';
}).join('');
window._albums=albums;
}).catch(function(){document.getElementById('album-list').innerHTML='<div class="empty">Errore caricamento.</div>';});
}

function apriAlbum(i){
var album=window._albums[i];
document.getElementById('album-view').style.display='none';
document.getElementById('foto-view').style.display='block';
document.getElementById('album-titolo').textContent=album.nome;
if(!album.foto.length){document.getElementById('foto-list').innerHTML='<div class="empty">Nessuna foto in questo album.</div>';return;}
document.getElementById('foto-list').innerHTML=album.foto.map(function(f){
return '<img src="https://drive.google.com/thumbnail?id='+f.id+'&sz=w400" onclick="apriLightbox(\'https://drive.google.com/uc?export=view&id='+f.id+'\')" loading="lazy">';
}).join('');
}

document.getElementById('btnBack').addEventListener('click',function(){
document.getElementById('foto-view').style.display='none';
document.getElementById('album-view').style.display='block';
});

document.getElementById('lbClose').addEventListener('click',function(){
document.getElementById('lightbox').classList.remove('open');
});

function apriLightbox(src){
document.getElementById('lbImg').src=src;
document.getElementById('lightbox').classList.add('open');
}

document.getElementById('btnAddU').addEventListener('click',function(){
var url=API+'?action=addUtente&nome='+encodeURIComponent(document.getElementById('an').value)+'&cognome='+encodeURIComponent(document.getElementById('ac').value)+'&ruolo='+encodeURIComponent(document.getElementById('ar').value)+'&email='+encodeURIComponent(document.getElementById('ae').value)+'&telefono='+encodeURIComponent(document.getElementById('at').value);
fetch(url).then(function(r){return r.json();}).then(function(d){
document.getElementById('mu').textContent=d.successo?'Aggiunto! Codice: '+d.codice_tessera:'Errore.';
if(d.successo){document.getElementById('an').value='';document.getElementById('ac').value='';document.getElementById('ae').value='';document.getElementById('at').value='';}
}).catch(function(){document.getElementById('mu').textContent='Errore connessione.';});
});

document.getElementById('btnAddE').addEventListener('click',function(){
var url=API+'?action=addEvento&titolo='+encodeURIComponent(document.getElementById('et').value)+'&data='+encodeURIComponent(document.getElementById('ed').value)+'&luogo='+encodeURIComponent(document.getElementById('el').value)+'&descrizione='+encodeURIComponent(document.getElementById('edes').value);
fetch(url).then(function(r){return r.json();}).then(function(d){
document.getElementById('me').textContent=d.successo?'Evento pubblicato!':'Errore.';
if(d.successo){document.getElementById('et').value='';document.getElementById('el').value='';document.getElementById('edes').value='';}
}).catch(function(){document.getElementById('me').textContent='Errore connessione.';});
});

document.getElementById('btnAddN').addEventListener('click',function(){
var url=API+'?action=addNews&titolo='+encodeURIComponent(document.getElementById('nt').value)+'&contenuto='+encodeURIComponent(document.getElementById('nc').value);
fetch(url).then(function(r){return r.json();}).then(function(d){
document.getElementById('mn').textContent=d.successo?'News pubblicata!':'Errore.';
if(d.successo){document.getElementById('nt').value='';document.getElementById('nc').value='';}
}).catch(function(){document.getElementById('mn').textContent='Errore connessione.';});
});
</script>
</body>
</html>
